syntax = "proto3";

package cascade.vision;

import "cascade.proto";

option csharp_namespace = "Cascade.Grpc.Vision";

// Vision Service for screenshots and OCR
service VisionService {
    // Screenshot capture
    rpc CaptureScreen(CaptureScreenRequest) returns (CaptureResponse);
    rpc CaptureWindow(CaptureWindowRequest) returns (CaptureResponse);
    rpc CaptureElement(CaptureElementRequest) returns (CaptureResponse);
    rpc CaptureRegion(CaptureRegionRequest) returns (CaptureResponse);
    
    // OCR
    rpc RecognizeText(RecognizeRequest) returns (OcrResponse);
    rpc FindText(FindTextRequest) returns (FindTextResponse);
    
    // Change detection
    rpc SetBaseline(SetBaselineRequest) returns (cascade.Result);
    rpc CompareWithBaseline(CompareRequest) returns (ChangeResponse);
    rpc CompareImages(CompareImagesRequest) returns (ChangeResponse);
    rpc WaitForChange(WaitForChangeRequest) returns (ChangeResponse);
    
    // Analysis
    rpc AnalyzeLayout(AnalyzeLayoutRequest) returns (LayoutResponse);
    rpc DetectElements(DetectElementsRequest) returns (VisualElementsResponse);
}

// PaddleOCR Service - Vision Transformer based OCR (Python gRPC service)
// Used as a fallback when Windows OCR and Tesseract fail to recognize text
service PaddleOcrService {
    // Basic OCR recognition
    rpc Recognize(PaddleOcrRequest) returns (PaddleOcrResponse);
    
    // Streaming for multiple images (batch processing)
    rpc RecognizeBatch(stream PaddleOcrRequest) returns (stream PaddleOcrResponse);
    
    // Health check and service status
    rpc GetStatus(PaddleOcrStatusRequest) returns (PaddleOcrStatus);
}

// Screenshot requests
message CaptureScreenRequest {
    int32 screen_index = 1;
    CaptureOptions options = 2;
}

message CaptureWindowRequest {
    string window_handle = 1;
    string window_title = 2;
    CaptureOptions options = 3;
}

message CaptureElementRequest {
    string runtime_id = 1;
    CaptureOptions options = 2;
}

message CaptureRegionRequest {
    cascade.Rectangle region = 1;
    CaptureOptions options = 2;
}

message CaptureOptions {
    string format = 1;  // png, jpeg, bmp
    int32 jpeg_quality = 2;
    bool include_cursor = 3;
    double scale = 4;
}

message CaptureResponse {
    cascade.Result result = 1;
    bytes image_data = 2;
    int32 width = 3;
    int32 height = 4;
    string format = 5;
    cascade.Rectangle captured_region = 6;
}

// OCR requests
message RecognizeRequest {
    bytes image_data = 1;
    OcrOptions options = 2;
}

message OcrOptions {
    string language = 1;
    bool preprocess = 2;
    double min_confidence = 3;
}

message OcrResponse {
    cascade.Result result = 1;
    string full_text = 2;
    double confidence = 3;
    repeated OcrLine lines = 4;
    int32 processing_time_ms = 5;
}

message OcrLine {
    string text = 1;
    cascade.Rectangle bounding_box = 2;
    double confidence = 3;
    repeated OcrWord words = 4;
}

message OcrWord {
    string text = 1;
    cascade.Rectangle bounding_box = 2;
    double confidence = 3;
}

message FindTextRequest {
    bytes image_data = 1;
    string search_text = 2;
    bool case_sensitive = 3;
}

message FindTextResponse {
    cascade.Result result = 1;
    bool found = 2;
    repeated TextMatch matches = 3;
}

message TextMatch {
    string text = 1;
    cascade.Rectangle bounding_box = 2;
    double confidence = 3;
}

// Change detection
message SetBaselineRequest {
    bytes image_data = 1;
    string baseline_id = 2;
}

message CompareRequest {
    bytes image_data = 1;
    string baseline_id = 2;
    CompareOptions options = 3;
}

message CompareImagesRequest {
    bytes baseline_image = 1;
    bytes current_image = 2;
    CompareOptions options = 3;
}

message CompareOptions {
    double change_threshold = 1;
    bool ignore_antialiasing = 2;
    int32 color_tolerance = 3;
    repeated cascade.Rectangle ignore_regions = 4;
}

message WaitForChangeRequest {
    cascade.Rectangle region = 1;
    int32 timeout_ms = 2;
    int32 polling_interval_ms = 3;
    double change_threshold = 4;
}

message ChangeResponse {
    cascade.Result result = 1;
    bool has_changes = 2;
    double difference_percentage = 3;
    repeated cascade.Rectangle changed_regions = 4;
    bytes difference_image = 5;
}

// Layout analysis
message AnalyzeLayoutRequest {
    bytes image_data = 1;
}

message LayoutResponse {
    cascade.Result result = 1;
    string layout_type = 2;
    cascade.Rectangle content_area = 3;
    repeated LayoutRegion regions = 4;
}

message LayoutRegion {
    string name = 1;
    string type = 2;
    cascade.Rectangle bounds = 3;
}

// Visual element detection
message DetectElementsRequest {
    bytes image_data = 1;
    repeated string element_types = 2;
}

message VisualElementsResponse {
    cascade.Result result = 1;
    repeated VisualElement elements = 2;
}

message VisualElement {
    string type = 1;
    cascade.Rectangle bounding_box = 2;
    double confidence = 3;
    string text = 4;
}

// PaddleOCR Messages

// Model selection for PaddleOCR
enum PaddleOcrModelType {
    PADDLE_OCR_MODEL_UNSPECIFIED = 0;
    PADDLE_OCR_MODEL_VITSTR = 1;       // Vision Transformer - balanced accuracy/speed
    PADDLE_OCR_MODEL_SVTR = 2;         // Single Visual Model - faster inference
    PADDLE_OCR_MODEL_PP_OCRV4 = 3;     // Latest PP-OCR model - best accuracy (default)
}

message PaddleOcrRequest {
    bytes image_data = 1;
    string language = 2;                          // e.g., "en", "ch", "japan"
    PaddleOcrModelType model = 3;
    bool use_angle_classifier = 4;                // Detect and correct text rotation
    bool detect_only = 5;                         // Only detect text regions, don't recognize
    PaddleOcrPreprocessing preprocessing = 6;     // Optional preprocessing options
}

message PaddleOcrPreprocessing {
    bool auto_enhance = 1;          // Auto-enhance for better recognition
    int32 scale_factor = 2;         // Upscale factor (1-4)
    bool deskew = 3;                // Auto-deskew rotated text
    bool denoise = 4;               // Apply denoising
}

message PaddleOcrResponse {
    bool success = 1;
    string error_message = 2;
    string full_text = 3;
    double confidence = 4;
    repeated PaddleOcrTextBlock blocks = 5;
    int32 processing_time_ms = 6;
    string model_used = 7;
}

message PaddleOcrTextBlock {
    string text = 1;
    repeated PaddleOcrPoint polygon = 2;   // 4-point polygon for rotated text support
    cascade.Rectangle bounding_box = 3;    // Axis-aligned bounding box
    double confidence = 4;
    repeated PaddleOcrWord words = 5;
}

message PaddleOcrPoint {
    int32 x = 1;
    int32 y = 2;
}

message PaddleOcrWord {
    string text = 1;
    repeated PaddleOcrPoint polygon = 2;
    cascade.Rectangle bounding_box = 3;
    double confidence = 4;
}

message PaddleOcrStatusRequest {
    // Empty request for status check
}

message PaddleOcrStatus {
    bool is_ready = 1;
    string model_loaded = 2;
    bool gpu_available = 3;
    int32 gpu_memory_used_mb = 4;
    repeated string supported_languages = 5;
    string paddle_version = 6;
    string paddleocr_version = 7;
}


