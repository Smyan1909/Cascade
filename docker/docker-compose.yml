version: '3.8'

services:
  server:
    build:
      context: ..
      dockerfile: docker/Dockerfile.server
    ports:
      - "50051:50051"
    environment:
      - CASCADE_DATABASE__PROVIDER=PostgreSQL
      - CASCADE_DATABASE__CONNECTIONSTRING=Host=db;Database=cascade;Username=cascade;Password=cascade
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:50051/health"]
      interval: 10s
      timeout: 5s
      retries: 3
    networks:
      - cascade-network
    volumes:
      - cascade-data:/app/data

  agent:
    build:
      context: ..
      dockerfile: docker/Dockerfile.agent
    environment:
      - CASCADE_SERVER_HOST=server
      - CASCADE_SERVER_PORT=50051
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
    depends_on:
      server:
        condition: service_healthy
    networks:
      - cascade-network

  db:
    image: postgres:16-alpine
    environment:
      - POSTGRES_USER=cascade
      - POSTGRES_PASSWORD=cascade
      - POSTGRES_DB=cascade
    volumes:
      - cascade-db:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cascade"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - cascade-network
    ports:
      - "5432:5432"

volumes:
  cascade-db:
  cascade-data:

networks:
  cascade-network:
    driver: bridge


